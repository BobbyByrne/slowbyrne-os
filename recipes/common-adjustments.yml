---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true # clean up added repos after module is done
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
        - vscodium.repo
    optfix:
      - Mullvad VPN
      - Filen
    install:
      packages:
        - alacritty
        - xdg-terminal-exec
        - git
        - android-tools
        - mullvad-vpn
        - https://cdn.filen.io/@filen/desktop/release/latest/Filen_linux_x86_64.rpm
        - syncthing
        - helix
        - gitui
        - codium
        - tailscale
        - steam
        - steam-devices
        - mangohud
        - fd-find
        - ripgrep
        - du-dust
        - procs
        - tldr
        - zoxide

  - type: systemd
    system:
      enabled:
        - mullvad-daemon.service
        - tailscaled.service

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode

  # this sets up the proper policy & signing files for signed images to work fully
  - type: signing

