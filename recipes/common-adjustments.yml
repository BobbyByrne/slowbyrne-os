---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:

# Mullvad VPN
  - type: dnf
    repos:
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
    optfix:
      - Mullvad VPN
    install:
      packages:
        - mullvad-vpn

  - type: systemd
    system:
      enabled:
        - mullvad-daemon.service

# Tailscale
  - type: dnf
    repos:
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
    install:
      packages:
        - tailscale

  - type: systemd
    system:
      enabled:
        - tailscaled.service

# VS Code / Codium
  - type: dnf
    repos:
      files:
        - vscode.repo
        - vscodium.repo
    install:
      packages:
        - code
        - codium

# Filen.io
  - type: dnf
    optfix:
      - Filen
    install:
      packages:
        - https://cdn.filen.io/@filen/desktop/release/latest/Filen_linux_x86_64.rpm

  - type: dnf
    install:
      packages:
        - alacritty

  - type: dnf
    install:
      packages:
        - xdg-terminal-exec

  - type: dnf
    install:
      packages:
        - git

  - type: dnf
    install:
      packages:
        - android-tools

  - type: dnf
    install:
      packages:
        - syncthing

  - type: dnf
    install:
      packages:
        - helix

  - type: dnf
    install:
      packages:
        - gitui

  - type: dnf
    install:
      packages:
        - steam

  - type: dnf
    install:
      packages:
        - steam-devices

  - type: dnf
    install:
      packages:
        - mangohud

  - type: dnf
    install:
      packages:
        - fd-find

  - type: dnf
    install:
      packages:
        - ripgrep

  - type: dnf
    install:
      packages:
        - du-dust

  - type: dnf
    install:
      packages:
        - procs

  - type: dnf
    install:
      packages:
        - tldr

  - type: dnf
    install:
      packages:
        - zoxide

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode

  # this sets up the proper policy & signing files for signed images to work fully
  - type: signing
